version: '3.8'
services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - '4000:4000'
    environment:
      - PORT=4000
      - FRONTEND_URL=http://localhost:3000
      - REDIS_URL=redis://redis:6379
      - ADMIN_PASSWORD=genfrenzy2024
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_BACKEND_URL=http://localhost:4000
    ports:
      - '3000:3000'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:
